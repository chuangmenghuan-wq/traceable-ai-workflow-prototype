<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorkflowGuard 中文摘要卡</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
      line-height: 1.6;
    }
    main { max-width: 820px; margin: 0 auto; padding: 40px 20px; }
    .card {
      background: white;
      border: 1px solid #d0d5dd;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(16, 24, 40, 0.06);
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 7px 12px;
      background: #fffaeb;
      color: #b54708;
      font-weight: 800;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 12px; }
    h2 { margin: 24px 0 8px; font-size: 1rem; }
    p { margin: 0 0 10px; }
    .note { color: #667085; font-size: 0.95rem; margin-top: 18px; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="badge">等級：Yellow</div>
      <h1>WorkflowGuard 中文摘要卡</h1>
      <p>這是一張簡短範例卡，用來快速看懂一個 AI 工作流程想法的起步方向。</p>

      <h2>先從哪裡開始</h2>
      <p>先用簡單範例測試，不要一開始就放進正式流程。</p>

      <h2>人要看過</h2>
      <p>AI 產出的內容先給人確認，再決定下一步。</p>

      <h2>小測試</h2>
      <p>先用 10 個範例問題測試，記錄哪些地方需要修正。</p>

      <h2>下一步</h2>
      <p>確認小測試有幫助後，再討論更完整的流程設計。</p>

      <p class="note">靜態展示頁。沒有登入、沒有後端、沒有儲存。</p>
    </section>
  </main>
</body>
</html>
